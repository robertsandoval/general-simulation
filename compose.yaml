# Local development only — do NOT use this in production.
#
# Starts the custom Postgres image (AGE + pgvector + PostGIS) so contributors
# can develop without an OpenShift cluster.
#
# Usage:
#   docker compose up -d          # start Postgres in background
#   docker compose down -v        # stop and remove data volume
#
# After the container is healthy, run the schema bootstrap:
#   uv run python -m src.graph.bootstrap
#
# Default credentials match .env.example (sim / sim / sim).
# Override by creating a .env file before running compose.

services:
  postgres:
    build:
      context: deploy/postgres
      dockerfile: Containerfile
      args:
        PGVECTOR_VERSION: "0.8.0"
        AGE_VERSION: "1.5.0"
        POSTGIS_MAJOR: "3"
    image: general-sim-postgres:local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sim}
      POSTGRES_DB: ${POSTGRES_DB:-sim}
    # AGE must be in shared_preload_libraries at server start.
    # The init SQL in docker-entrypoint-initdb.d runs after this.
    command: >
      postgres
        -c shared_preload_libraries=age
        -c log_min_messages=warning
        -c log_connections=off
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount init SQL so it runs on first container start
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-sim} -d ${POSTGRES_DB:-sim}
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
    driver: local
