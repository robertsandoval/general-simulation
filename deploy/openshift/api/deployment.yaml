# ─────────────────────────────────────────────────────────────────────────────
# FastAPI application — Deployment, Service, and OpenShift Route.
#
# Prerequisites:
#   - App image built and pushed (see deploy/app/Containerfile).
#   - Secrets: app-secrets (POSTGRES_DSN, LLAMA_STACK_BASE_URL).
#   - ConfigMap: app-config.
#   - Postgres bootstrap Job completed successfully.
#   - Llama Stack Service reachable at http://llamastack.general-sim.svc:8321.
#
# Apply:
#   oc apply -f deploy/openshift/api/deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: general-sim-api
  namespace: general-sim
  labels:
    app: general-sim-api
    app.kubernetes.io/name: general-sim-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: general-sim
spec:
  replicas: 2
  selector:
    matchLabels:
      app: general-sim-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: general-sim-api
        app.kubernetes.io/name: general-sim-api
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      # Spread replicas across nodes for basic HA.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: general-sim-api

      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/general-sim/general-sim-app:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Secrets: connection strings and service URLs
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_DSN
            - name: LLAMA_STACK_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: LLAMA_STACK_BASE_URL

          # Non-sensitive config: model names, flags
          envFrom:
            - configMapRef:
                name: app-config

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: "1"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
