# ─────────────────────────────────────────────────────────────────────────────
# Placeholder Secrets — REPLACE all values marked REPLACE_ME before applying.
#
# Recommended: manage these with an External Secrets Operator (ESO) backed by
# HashiCorp Vault, AWS Secrets Manager, or another secret store rather than
# committing actual values to Git.  This file documents the shape; the real
# values live in your secret store.
#
# Apply:
#   oc apply -f deploy/openshift/shared/secrets.yaml
# ─────────────────────────────────────────────────────────────────────────────
---
# Postgres credentials — used by the StatefulSet and the application.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: general-sim
  labels:
    app.kubernetes.io/part-of: general-sim
    app.kubernetes.io/component: postgres
type: kubernetes.io/basic-auth
stringData:
  username: sim
  password: REPLACE_ME
---
# Application runtime secrets — database DSN and Llama Stack URL.
# Mounted into the API Deployment and the bootstrap Job as env vars.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: general-sim
  labels:
    app.kubernetes.io/part-of: general-sim
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # The Postgres Service is named "postgres" (see postgres/statefulset.yaml).
  POSTGRES_DSN: "postgresql://sim:REPLACE_ME@postgres.general-sim.svc:5432/sim"
  LLAMA_STACK_BASE_URL: "http://llamastack.general-sim.svc:8321"
---
# Llama Stack pgvector provider credentials (separate from the app DSN so
# Llama Stack can be deployed independently and rotated separately).
apiVersion: v1
kind: Secret
metadata:
  name: llamastack-secrets
  namespace: general-sim
  labels:
    app.kubernetes.io/part-of: general-sim
    app.kubernetes.io/component: llamastack
type: Opaque
stringData:
  PGVECTOR_PASSWORD: REPLACE_ME
  # Hugging Face token — required only when the model must be downloaded from
  # the Hub. Leave empty if your vLLM node has the model pre-loaded on PVC.
  HF_TOKEN: ""
