# ─────────────────────────────────────────────────────────────────────────────
# CloudNativePG Cluster — PostgreSQL with AGE, pgvector, and PostGIS.
#
# Prerequisites:
#   1. CloudNativePG operator installed in the cluster:
#      oc apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.24/releases/cnpg-1.24.0.yaml
#
#   2. Build and push the CNPG-compatible custom Postgres image:
#      podman build \
#        -f deploy/postgres/Containerfile.cnpg \
#        -t image-registry.openshift-image-registry.svc:5000/general-sim/general-sim-postgres:latest \
#        deploy/postgres
#      podman push \
#        image-registry.openshift-image-registry.svc:5000/general-sim/general-sim-postgres:latest
#
#   3. Secret postgres-credentials must exist (see shared/secrets.yaml).
#
# Apply:
#   oc apply -f deploy/openshift/postgres/cluster.yaml
#
# CNPG creates these Services in the namespace:
#   general-sim-postgres-rw  (primary — read/write)
#   general-sim-postgres-ro  (replicas — read-only; unavailable in single-node)
#   general-sim-postgres-r   (any instance)
#
# The application and Llama Stack use general-sim-postgres-rw as the hostname.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: general-sim-postgres
  namespace: general-sim
  labels:
    app.kubernetes.io/part-of: general-sim
    app.kubernetes.io/component: postgres
spec:
  # Use 1 for dev/staging; set to 3 (or more) for HA in production.
  instances: 1

  # CNPG-compatible custom image (built from Containerfile.cnpg).
  imageName: image-registry.openshift-image-registry.svc:5000/general-sim/general-sim-postgres:latest

  postgresql:
    parameters:
      # AGE requires shared_preload_libraries to register its hooks.
      shared_preload_libraries: "age"
      log_min_messages: "warning"
      log_connections: "off"

  bootstrap:
    initdb:
      database: sim
      owner: sim
      secret:
        name: postgres-credentials
      # Create extensions right after initdb so the bootstrap Job can use them.
      postInitSQL:
        - "CREATE EXTENSION IF NOT EXISTS age"
        - "CREATE EXTENSION IF NOT EXISTS vector"
        - "CREATE EXTENSION IF NOT EXISTS postgis"

  storage:
    # Adjust size and storageClass to match your cluster's provisioner.
    # Common choices on OpenShift: gp3-csi (AWS), thin-csi (vSphere), managed-csi (Azure).
    size: 10Gi
    storageClass: ""   # leave empty to use the cluster default StorageClass

  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: "1"

  # Backups (optional but recommended for production).
  # Uncomment and configure a ScheduledBackup + barmanObjectStore.
  # backup:
  #   retentionPolicy: "7d"
  #   barmanObjectStore:
  #     destinationPath: s3://your-backup-bucket/general-sim-postgres
  #     s3Credentials:
  #       accessKeyId:
  #         name: s3-backup-credentials
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: s3-backup-credentials
  #         key: SECRET_ACCESS_KEY
  #     wal:
  #       compression: gzip

  monitoring:
    # Set to true if the Prometheus Operator (or OpenShift User Workload Monitoring)
    # is enabled — CNPG will create a PodMonitor automatically.
    enablePodMonitor: false
