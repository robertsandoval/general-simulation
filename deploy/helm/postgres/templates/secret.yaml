apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgres.username | quote }}
  password: {{ required "postgres.password is required — pass via --set postgres.password=<pw>" .Values.postgres.password | quote }}
