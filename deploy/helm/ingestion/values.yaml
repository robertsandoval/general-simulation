image: quay.io/robertsandoval/general-sim-app:latest

# Cron schedule (default: every 10 minutes).
schedule: "*/10 * * * *"

# Adapter to run. Must match an adapter_id registered in src/ingestion/__main__.py.
adapterId: opensky_flights

postgres:
  host: postgres.general-sim.svc
  port: 5432
  user: sim
  password: ""   # required — pass via --set postgres.password=<pw>
  database: sim

llm:
  baseUrl: "https://api.openai.com/v1"
  apiKey: ""
  backend: "openai"

models:
  generation: gpt-4o-mini
  embedding: text-embedding-3-small
  embeddingDimension: "1536"

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
