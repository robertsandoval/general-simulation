apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vllm.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "vllm.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: vllm
          image: {{ .Values.image }}
          imagePullPolicy: Always
          args:
            - --model
            - {{ .Values.model.path | quote }}
            - --enable-auto-tool-choice
            - --tool-call-parser
            - {{ .Values.model.toolCallParser | quote }}
            - --max-model-len
            - {{ .Values.model.maxModelLen | quote }}
            - --served-model-name
            - {{ .Values.model.path | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if .Values.hfToken }}
            - name: HF_TOKEN
              value: {{ .Values.hfToken | quote }}
            {{- end }}
            - name: HF_HOME
              value: /models/.cache
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
