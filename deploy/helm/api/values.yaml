image: quay.io/robertsandoval/general-sim-app:latest

replicas: 2

postgres:
  host: postgres.general-sim.svc
  port: 5432
  user: sim
  password: ""   # required — pass via --set postgres.password=<pw>
  database: sim

llm:
  # Base URL for the OpenAI-compatible inference endpoint.
  # Override to point at a self-hosted model (vLLM, Llama Stack, Ollama, etc.):
  #   --set llm.baseUrl=http://vllm.general-sim.svc:8080/v1
  #   --set llm.baseUrl=http://llamastack.general-sim.svc:8321/v1
  baseUrl: "https://api.openai.com/v1"
  # API key — pass via --set llm.apiKey=<key>
  # Set to any non-empty string for self-hosted endpoints that don't require auth.
  apiKey: ""
  # Backend selector: openai | llamastack | fake
  backend: "openai"

models:
  generation: gpt-4o-mini
  embedding: text-embedding-3-small
  embeddingDimension: "1536"

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: "1"
