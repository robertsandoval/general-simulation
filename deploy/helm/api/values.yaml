image: quay.io/robertsandoval/general-sim-app:latest

replicas: 2

postgres:
  host: postgres.general-sim.svc
  port: 5432
  user: sim
  password: ""   # required — pass via --set postgres.password=<pw>
  database: sim

llamastack:
  url: http://llamastack.general-sim.svc:8321

models:
  generation: meta-llama/Llama-3.1-8B-Instruct
  embedding: all-MiniLM-L6-v2
  embeddingDimension: "384"
  useFakeLlamaStack: "false"

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: "1"
