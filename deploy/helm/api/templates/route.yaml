# OpenShift Route — exposes the API externally with TLS edge termination.
# The hostname is auto-assigned by the OpenShift router if not specified.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: general-sim-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: general-sim-api
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
