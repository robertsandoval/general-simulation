apiVersion: v1
kind: Service
metadata:
  name: general-sim-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
