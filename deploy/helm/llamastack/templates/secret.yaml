apiVersion: v1
kind: Secret
metadata:
  name: llamastack-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llamastack.labels" . | nindent 4 }}
type: Opaque
stringData:
  # pgvector password injected into the Llama Stack run.yaml at startup.
  PGVECTOR_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
